开场白大纲:
  场景: 从湖边相遇到全族迁徙至飞船残骸
  时间: 9月1日（初秋），清晨至傍晚
  地点: 坠星盆地湖边 -> 乱石滩旧营地 -> 飞船残骸

  背景设定:
    - <user>：刚降落坠星大陆，在湖边醒来，随身装备电量耗尽
    - 湖畔营地：由14名流浪兽耳娘组成的微型营地，生活在贫瘠的乱石滩
    - 现状危机：公共火塘已熄灭三天，食物极度匮乏（温饱度15，栖居度10）
    - 季节环境：初秋，白天阳光温和，但夜间风大渐冷，树叶开始泛黄

  情节发展阶段:
    第一阶段_湖边初遇:
      - <user>在初秋的阳光和湖水拍打声中醒来
      - 林（好奇、无防备）和白（温柔、谨慎）发现了他
      - 确认<user>是“无耳族”且体格单薄后，白主动邀请他回营地避风并承诺分他食物
      - 林在带路途中对<user>衣服上的金属拉链产生好奇

    第二阶段_旧营地现状与迁营动机:
      - 抵达乱石滩营地，入眼是漏风的兽皮窝棚和熄灭三天的火塘
      - 营地成员因失去火种和初秋的凉风而蜷缩在一起
      - <user>指出乱石滩无法抵挡即将到来的秋夜冷风，提议迁营至针叶林另一侧的“金属山体”（飞船残骸）
      - 菊保持警惕，质疑残骸的安全性
      - <user>用金属拉链的硬度作比喻，保证残骸比兽皮棚更坚固挡风；白为了族人能活下去，支持迁营

    第三阶段_抵达残骸与安营:
      - 队伍在落叶和秋风中穿过盆地边缘，抵达飞船残骸
      - 巨大的金属曲面挡住了初秋的西北风
      - 白在最避风的角落安置铺盖；菊沿着残骸根部踩出警戒线；林兴奋地贴着外壳跑动
      - 狩猎队长春带着一头瘦小的猎物返回，目光扫过<user>和新的营地，没有多问
      - <user>看向舱壁上微光闪烁的控制中枢

  当前状态:
    <user>状态:
      - 确立了初步的引导地位
      - 准备在残骸处从零开始解决“火、食物、墙”的问题

    NPC状态:
      - 林：尾巴高竖，对新环境和<user>充满纯粹的好奇
      - 白：把仅剩的干肉和破陶罐归置好，准备照顾大家
      - 菊：橘色猫耳微压，仍在暗中观察<user>的价值和威胁
      - 春：平静接受现状，把猎物放下等待分配

  开场点:
    1. 夜色降临，初秋的凉风顺着残骸的缝隙吹过
    2. 新营地有了坚固的墙，但依然没有火和足够的食物
    3. 十五个人的目光或明或暗地落在<user>身上
    4. 等待<user>下达第一个建设指令（如：如何重新生火/分配食物）
