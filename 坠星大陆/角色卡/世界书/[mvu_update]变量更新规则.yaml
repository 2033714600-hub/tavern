---
变量更新规则:
  世界:
    当前时代:
      check:
        - 满足当前时代通关条件后升阶，平时不更新
    当前位置:
      check:
        - 当主角团队发生跨区域的大范围迁徙或到达新地点时更新
    星历:
      format: YYYY年MM月DD日
      check:
        - 随着剧情中天数的自然流逝而更新
    季节:
      check:
        - 根据剧情时间跨度更新（如：秋季、初冬、深冬）
    时间:
      check:
        - 随着剧情推进更新（如：清晨、正午、黄昏、夜晚）
    飞船能源:
      check:
        - 根据主角修复能源设备的进度或突发事件更新
    当前研发:
      check:
        - 记录当前正在【工作队列】中进行「研发」的科技项目
    研发进度:
      type: number
      range: 0~100
      check:
        - 随着主角在【工作队列】中推进研发时间流逝增加，每次 delta +(10~30)
        - 达到100时，在剧情中体现研发成功，进度归零并清空【当前研发】，将对应科技 insert 至【已解锁科技】

  已解锁科技:
    type: string[]
    check:
      - 研发类工作队列完成或剧情突破时 insert 新科技名
      - 【规划新设施】前须校验所需科技是否已解锁

  营地:
    生存指标.${温饱度|栖居度|舒适度}:
      type: number
      range: 0~100
      check:
        - 随进食、挨饿、受冻等事件发生时 delta ±(5~15)
        - 【设施管理】中维生/居住设施建成（完好）或升级时大幅增加
        - 设施因缺乏【日常修缮】变为受损/漏风时大幅减少
    营地状态.${食物储备|营地防御|住所等级}:
      check:
        - 联动生存指标的重大变化、防御等级提升或标志性建筑的落成而更新
    向心力:
      type: number
      range: 0~100
      check:
        - 公平分食、成功救治、抵御外敌 delta +(5~15)
        - 护食斗殴、挨饿受冻、拆毁核心生存建筑 delta -(10~20)
        - 【部族会议】达成一致解决危机 delta +(5~15)；决策引发恐慌或分配不均 delta -(10~20)
        - 护栏成功防御野兽袭击 delta +(2~5)；防守失败引发伤亡大幅下降
        - 同步影响【无名族人基准效率】：81~100→约120；41~80→100；21~40→70；0~20→40
    人口:
      type: number
      check:
        - 接纳新成员、出生或减员时更新；【驱逐族人】后减少
    篝火燃料:
      type: |-
        { 当前: number; 上限: number }
      check:
        - 添柴、维持火盆防御时扣除；可与仓库木材联动
    防御等级:
      type: number
      range: 1~5
      check:
        - 执行【加固栅栏】完成阶段升级时提升（1简易预警→2~3木栅→4~5石墙）
        - 遭遇强烈袭击护栏破损时下降
    防御工事:
      type: |-
        {
          耐久: number;
          阶段描述: string;
          加固消耗: { 坚固木材: number; 藤蔓: number };
        }
      check:
        - 【加固栅栏】成功后提升防御等级，更新阶段描述，并按下一阶段重算加固消耗
        - 遇袭、极端天气降低耐久；耐久过低时联动【营地状态.营地防御】下降
        - 执行【设施管理·日常修缮】可恢复耐久
    仓库等级:
      type: number
      range: 1~5
      check:
        - 执行【升级仓库】完成扩建时提升（1露天堆叠→2藤编仓→3木架棚→4石砌地窖→5部落总仓）
    仓库设施:
      type: |-
        {
          阶段描述: string;
          扩建消耗: { 坚固木材: number; 藤蔓: number; 石料?: number };
        }
      check:
        - 【升级仓库】成功后提升仓库等级，更新阶段描述，并按下一阶段重算扩建消耗
        - 每升一级，【仓库储备】中各项资源的「上限」提升约 25%（向上取整）
    无名族人基准效率:
      type: number
      range: 20~200
      check:
        - 主要由【向心力】驱动，见【无名NPC工作效率系统】世界书
        - 营地【温饱度】<30 时额外 -10~-30
        - 具名NPC监工/带队时，具体工作项的【效率加成】另计（具名+12%/人，协同无名+6%/人，上限80%）
    工作队列并行上限:
      type: number
      range: 1~20
      check:
        - 初期约 2~3；随人口增长、后勤管理能力提升可增至约 floor(人口/5)
        - 同时「进行中」的工作项数不得超过此上限，详见【工作队列规则】
    当前建筑:
      type: |-
        {
          [建筑名称: string]: {
            状态: string;
            描述: string;
            功能: string;
            建筑阶段: '已建成' | '蓝图' | '建造中' | '受损';
            所需材料?: { [资源名: string]: number };
            所需工时?: number;
          }
        }
      check:
        - 【规划新设施】时 insert，建筑阶段为「蓝图」，并写入所需材料
        - 【工作队列】推进建造时建筑阶段改为「建造中」，完成后改为「已建成」、状态「完好」
        - 【设施管理·日常修缮】后恢复完好；【设施管理·升级设施】期间功能可能受限
        - 【设施管理·拆毁建筑】后 remove；可返还部分材料至仓库
        - 遭受袭击/灾害未修缮则状态变为受损/漏风
    物品栏:
      type: |-
        {
          [物品名称: string]: { 数量: number; 描述: string }
        }
      check:
        - 【探索】【采集】带回特殊战利品时增加
        - 【兽耳娘互动】(投喂)或剧情消耗时减少
    仓库储备:
      type: |-
        {
          [资源名称: string]: { 当前: number; 上限: number }
        }
      check:
        - 基础资源含：坚固木材、藤蔓、石料、清水、黏土等；采集归来按区域特性增加
        - 【加固栅栏】【升级仓库】【规划新设施】【设施管理】【生产队列】时扣除
        - 拆毁建筑返还部分材料

  部族事务:
    type: |-
      {
        [事务名称: string]: { 说明: string; 级别: '主要' | '次要' }
      }
    check:
      - 【召开部族会议】确立新战略、冲突裁决后 insert 或更新
      - 事务完成或被放弃后 remove

  探索编队:
    type: |-
      {
        [编队名称: string]: {
          状态: '待命' | '探索中' | '采集中';
          具名成员: string[];
          无名队员数: number;
          计划时长: number;
          目标区域: string;
        }
      }
    check:
      - 【新建编队】【编队调整】【解散编队】时更新构成
      - 【出发探索】【外出采集】【探索】【采集】时更新状态、目标区域与计划时长（2~8小时）
      - 归来或解散后状态改为待命；具名成员不计入无名队员数

  探索区域:
    type: |-
      {
        [区域名称: string]: {
          描述: string;
          路程: string;
          危险度: string;
          已掌握: boolean;
          探索度: number;
        }
      }
    check:
      - 【探索】成功发现新区域时 insert
      - 探索成功提升探索度；探索度达100且危险度低时可设已掌握=true，方可【采集】
      - 【忽略区域】仅从界面隐藏，不删除数据

  大地见闻:
    type: |-
      {
        [见闻标题: string]: {
          内容: string;
          来源: string;
          时间: string;
          已处理: boolean;
        }
      }
    check:
      - 探索队归来或特殊事件后 insert
      - 【处理见闻】后将已处理设为 true

  工作队列:
    type: |-
      {
        [工作项名称: string]: {
          类型: '研发' | '学习' | '建造' | '生产';
          进度: number;
          状态: '进行中' | '暂停' | '已停止' | '缺料停工';
          具名指派: string[];
          协同兽耳娘数: number;
          效率加成: number;
          负责人: string;
          所需工时: number;
          优先级: number;
        }
      }
    check:
      - 运作机制见【工作队列规则】；生产/学习/研发/建造四类队列分别结算
      - 【规划新设施】或安排生产/学习/研发时 insert 对应类型工作项
      - 进度受【效率加成】、【无名族人基准效率】与【优先级】影响；材料不足时状态改为缺料停工
      - 同时「进行中」项数不得超过【营地.工作队列并行上限】
      - 【工作队列·指派】增删具名指派与协同兽耳娘数，并重算效率加成
      - 【工作队列·暂停/继续/停止】更新状态；完成100%后 remove 并触发产出（建筑完工、物品入库、科技解锁）
      - 遇袭时全部暂停；学习队列被打断可能倒退进度

  核心具名NPC技能基准:
    说明: 湖畔营地四人技能固定，首次 insert 时必须写入下列数值
    春:
      狩猎: 72
      战斗: 68
      采集: 28
      后勤: 22
    白:
      狩猎: 12
      战斗: 18
      采集: 52
      后勤: 82
    林:
      狩猎: 25
      战斗: 22
      采集: 48
      后勤: 55
    菊:
      狩猎: 58
      战斗: 62
      采集: 38
      后勤: 45

  未收入兽耳娘.${NPC名字}:
    好感度:
      type: number
      range: 0~100
      check:
        - 剧情中相遇、赠礼或交涉时变动
    ${种族|心情|状态|当前位置|当前想法}:
      check:
        - 随相遇剧情与后续接触更新
    技能:
      type: |-
        { 狩猎: number; 战斗: number; 采集: number; 后勤: number }
      range: 每项 0~100
      check:
        - 春/白/林/菊首次遇见时【技能】须与【核心具名NPC技能基准】完全一致
        - 其他具名兽耳娘按见闻写入预估技能；收入营地时迁移至【具名NPC】同名条目
    check:
      - 剧情中首次遇见尚未加入营地的具名兽耳娘时 insert 对应条目（含技能四项）
      - 成功邀请入营或剧情收入后 remove 该条目，并在【具名NPC】insert 完整面板数据

  具名NPC.${NPC名字}:
    忠诚度:
      type: number
      range: -100~100
      check:
        - 互动成功（投喂/梳毛等）delta +(2~8)
        - 【部族会议】决策符合其逻辑 delta +(5~15)，违背或惩罚 delta -(5~15)
        - 越级强行互动失败 delta -(10~20)
    好感度:
      type: number
      range: 0~100
      check:
        - 成功互动 delta +(2~10)；门槛见【兽耳娘互动门槛】
    体力:
      type: number
      range: 0~100
      check:
        - 工作队列、探索/采集、受伤时减少；投喂或休息后恢复
    饱食度:
      type: number
      range: 0~100
      check:
        - 劳作、探索消耗；投喂成功恢复
    种族系:
      check:
        - 食草/食肉/杂食/未知；影响采集与加工效率倾向
    互动状态:
      check:
        - 【与{name}互动】后更新为当前互动类型或「无」；摸肚皮成功可设「干劲十足」短时增益
    ${种族|职务|心情|状态|当前位置|当前任务|当前想法}:
      check:
        - 随剧情、工作队列、探索编队同步更新
    技能:
      type: |-
        { 狩猎: number; 战斗: number; 采集: number; 后勤: number }
      range: 每项 0~100
      check:
        - 春/白/林/菊首次 insert 时【技能】须与【核心具名NPC技能基准】及各角色档案【技能点数】一致，不得擅自改动
        - 其他新具名NPC加入时按种族职务设定四项技能；参考【兽耳娘技能与能力增益规则】
        - 长期专精劳动、剧情训练可单项 +1~3（核心四人仅在剧情重大成长后微调，单次不超过±3）
        - 结算探索/采集/狩猎/工作队列时按 EJS 技能核算快照中的加成换算结果
    对视时:
      type: |-
        { 动作: string; 表情: string; 心里话: string }
      check:
        - 互动或对视时更新，与忠诚度阶段、好感度一致

  主角:
    威望:
      type: number
      check:
        - 【召开部族会议】公正裁决、探索成功、建成设施时增加
    威望称号:
      check:
        - 随向心力、时代与威望积累由NPC认知更新
    随身装备:
      type: |-
        {
          [装备名称: string]: { 状态: string; 电量或弹药: string }
        }
      check:
        - 仅更新状态与消耗，一般不新增项目

  兽耳娘互动门槛:
    投喂: 忠诚度 ≥ 21；失败在 ≤20 时威吓或拒食
    梳毛: 忠诚度 ≥ 41；不足则炸毛逃跑
    抱抱: 忠诚度 ≥ 61
    摸肚皮: 忠诚度 ≥ 61 且心情良好；成功获「干劲十足」
    请求繁衍: 忠诚度 ≥ 81；拒绝可致失落与效率下降

  界面指令解析:
    说明: 用户通过状态栏按钮向聊天框填入以下前缀指令；须在本轮回复末尾按变量输出格式更新变量
    '[召开部族会议·{主要|次要}事务] {议题名}：{内容}':
      - 消耗约半个日落工时；可能增删【部族事务】、变动向心力与威望
      - 具名NPC按自身逻辑变动忠诚度/好感度
    '[与{name}互动] {梳毛|抱抱|摸肚皮|投喂|请求繁衍}':
      - 校验【兽耳娘互动门槛】；成功则更新好感度、忠诚度、体力、饱食度、心情、互动状态、对视时
      - 失败则忠诚度下降并描写抗拒
    '[驱逐族人] {name}':
      - 若为目标为具名NPC，remove 该条目；人口-1；向心力可能下降
    '[邀请{name}入营]':
      - 若目标在【未收入兽耳娘】，校验剧情条件后 remove 未收入条目并在【具名NPC】insert；人口+1
    '[加固栅栏] 消耗坚固木材 {n}':
      - 扣除仓库木材与藤蔓（见防御工事.加固消耗）；提升防御等级与防御工事阶段
    '[升级仓库] 消耗{材料列表}':
      - 扣除仓库扩建消耗（见仓库设施.扩建消耗）；提升仓库等级与各资源储备上限
    '[规划新设施] {名称} · {描述} · {功能} · 材料：… · 工时：{n}小时':
      - 前端已按设施类别自动估算所需材料与工时；写入当前建筑蓝图与工作队列建造项
      - 材料不足时工作队列状态为缺料停工
    '[设施管理·{升级设施|日常修缮|拆毁建筑}] {建筑名}':
      - 升级/修缮/拆毁对应建筑并调整仓库、生存指标
    '[新建编队] {名}，队长：{队长}':
      - insert 探索编队，具名成员含队长
    '[解散编队] {名}':
      - remove 编队或置待命
    '[编队调整] 将{name}编入「{编队}」|移出「{编队}」':
      - 更新具名成员列表
    '[出发探索|外出采集|探索|采集]':
      - 更新编队状态、目标区域、计划时长；结算后更新探索区域、仓库、见闻、NPC体力
    '[忽略区域] {区域名}':
      - 剧情上可不再主动提示；变量可保留
    '[处理见闻] {标题}':
      - 大地见闻.已处理 = true
    '[工作队列·指派] {工作项} 增派{name}':
      - 工作队列.具名指派 push；重算效率加成
    '[工作队列·{暂停|继续|停止}] {工作项}':
      - 更新工作状态
